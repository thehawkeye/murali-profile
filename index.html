<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murali Krishnan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .roles {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .role {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }
        .links a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 1rem;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Murali Krishnan</h1>
        <p class="subtitle">Former President, Xiaomi India | Independent Academic</p>
        <div class="roles">
            <span class="role">Academic Researcher</span>
            <span class="role">Executive Educator</span>
            <span class="role">Advisor</span>
        </div>
        <div class="links">
            <a href="https://www.linkedin.com/in/muralikrishnan">LinkedIn</a>
            <a href="https://twitter.com/muralikrishnan">Twitter</a>
            <a href="https://thehawkeye.substack.com">Substack</a>
        </div>
    </div>
</body>
</html>
